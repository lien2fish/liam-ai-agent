name: 漁獲行情每日追蹤

on:
  schedule:
    - cron: '10 0 * * *'   # 台灣 08:10
  workflow_dispatch:

jobs:
  track:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: 還原歷史價格快取
        uses: actions/cache@v4
        with:
          path: seafood/price_history.json
          key: seafood-price-${{ github.run_id }}
          restore-keys: |
            seafood-price-

      - name: 執行價格追蹤
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          GEMINI_KEY:   ${{ secrets.GEMINI_KEY }}
        run: python3 seafood/price_tracker.py

      - name: Commit 設定與歷史記錄
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add seafood/price_config.json seafood/price_history.json
          git diff --staged --quiet || git commit -m "chore: 更新漁獲行情 $(date +%Y-%m-%d)"
          git push
