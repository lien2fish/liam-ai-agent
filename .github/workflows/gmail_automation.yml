name: Gmail 自動化（清理 + 新聞摘要）

on:
  schedule:
    - cron: '0 0 * * *'    # UTC 00:00 = 台灣 08:00
  workflow_dispatch:        # 允許手動觸發

jobs:
  gmail-automation:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 新聞摘要（08:00）
        env:
          GMAIL_CLIENT_ID:     ${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
          GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
        run: python3 gmail_news_digest.py

      - name: Gmail 清理（08:05）
        env:
          GMAIL_CLIENT_ID:     ${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
          GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
        run: python3 gmail_monthly_cleanup.py

      - name: Commit 報告到 repo
        run: |
          git config user.name  "Liam AI Agent"
          git config user.email "lien2fish@gmail.com"
          git add reports/ 今日新聞摘要.md
          git diff --cached --quiet || git commit -m "chore: 自動更新 Gmail 報告 $(date '+%Y-%m-%d')"
          git push
