name: YouTube 頻道每日表現日報

on:
  schedule:
    - cron: '20 0 * * *'    # UTC 00:20 = 台灣 08:20
  workflow_dispatch:

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run channel report
        env:
          YT_API_KEY:          ${{ secrets.YT_API_KEY }}
          YT_REPORT_HANDLE:    'UnknownHourCosmos'
          GMAIL_APP_PASSWORD:  ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python youtube_auto/daily_report.py

      - name: Commit report and state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/yt頻道日報_*.md youtube_auto/report_state.json
          git diff --staged --quiet || git commit -m "YouTube 頻道日報 $(date +%F)"
          git push
