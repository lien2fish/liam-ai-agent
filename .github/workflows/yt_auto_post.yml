name: YouTube 每日自動影片

on:
  schedule:
    - cron: '0 2 * * *'    # UTC 02:00 = 台灣 10:00 製作影片；當天 18:00 自動轉公開
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ffmpeg and Chinese fonts
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg fonts-noto-cjk
          fc-cache -f

      - name: Install Python dependencies
        run: pip install edge-tts requests

      - name: Generate and upload Short
        env:
          ANTHROPIC_API_KEY:       ${{ secrets.ANTHROPIC_API_KEY }}
          HF_TOKEN:                ${{ secrets.HF_TOKEN }}
          YT_OAUTH_CLIENT_ID:      ${{ secrets.YT_OAUTH_CLIENT_ID }}
          YT_OAUTH_CLIENT_SECRET:  ${{ secrets.YT_OAUTH_CLIENT_SECRET }}
          YT_OAUTH_REFRESH_TOKEN:  ${{ secrets.YT_OAUTH_REFRESH_TOKEN }}
          YT_PRIVACY:              'private'
          YT_PUBLISH_HOUR:         '18'        # 台灣時間18:00自動轉公開（排程發布）
          # 格式(長片16:9 / Shorts9:16)由 make_and_upload 依星期自動決定；可設 YT_FORMAT 覆寫
          GITHUB_TOKEN:            ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO:             ${{ github.repository }}
        run: python youtube_auto/make_and_upload.py
