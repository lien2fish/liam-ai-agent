name: 個人財務月度自動更新

on:
  schedule:
    - cron: '0 0 1 * *'    # UTC 00:00 = 台灣 08:00，每月 1 日
  workflow_dispatch:        # 允許手動觸發

jobs:
  finance-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 安裝中文字型
        run: |
          sudo apt-get install -y fonts-noto-cjk
          fc-cache -fv

      - name: 安裝依賴
        run: pip install python-dateutil matplotlib Pillow numpy yfinance

      - name: 執行財務自動更新
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: python3 finance/finance_updater_v2.py

      - name: 生成並嵌入圖表
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: python3 finance/generate_charts.py

      - name: Commit 日誌與圖表到 repo
        run: |
          git config user.name  "Liam AI Agent"
          git config user.email "lien2fish@gmail.com"
          git add "財務/finance_update_log.txt" finance/charts/
          git diff --cached --quiet || git commit -m "chore: 個人財務月度自動更新 + 圖表 $(date '+%Y-%m')"
          git push
