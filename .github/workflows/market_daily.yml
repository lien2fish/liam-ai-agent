name: 每日股市分析報告

on:
  schedule:
    - cron: '0 1 * * *'   # 台灣 09:00（UTC+8）
  workflow_dispatch:

jobs:
  report:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: 還原歷史記錄快取
        uses: actions/cache@v4
        with:
          path: market/market_history.json
          key: market-history-${{ github.run_id }}
          restore-keys: |
            market-history-

      - name: 執行每日市場分析
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          GEMINI_KEY:   ${{ secrets.GEMINI_KEY }}
        run: python3 market/market_report.py

      - name: Commit 報告與歷史記錄
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add market/market_config.json market/market_history.json
          git add "reports/市場日報_$(date +%Y-%m-%d).md" 2>/dev/null || true
          git diff --staged --quiet || git commit -m "chore: 市場日報 $(date +%Y-%m-%d)"
          git push
